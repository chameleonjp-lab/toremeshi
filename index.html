async function loadData(){renderLoading();try{const [q,f,p,e,r]=await Promise.all([fetch(FILES.questions),fetch(FILES.foods),fetch(FILES.proteins),fetch(FILES.extras),fetch(FILES.rules)]);for(const res of [q,f,p,e,r]) if(!res.ok) throw new Error(res.url+' '+res.status);rows.questions=parseCSV(await q.text());rows.foods=parseCSV(await f.text());rows.proteins=parseCSV(await p.text());rows.extras=parseCSV(await e.text());rules=await r.json();const errors=validate();if(errors.length) return renderErrors(errors);renderHome();}catch(ex){renderErrors([err('読み込みエラー','5 files','','',ex.message)])}}

function pickFor(t,used,usedText,correctMax=2,avoidSet=true){let cs=shuffle(byType[t]).filter(q=>!used.has(q.questionId)&&!usedText.has(q.questionText));cs=cs.filter(q=>deck.filter(d=>d.correctId===q.correctId).length<correctMax);if(avoidSet)cs=cs.filter(q=>!deck.some(d=>d.choices.map(c=>c.id).sort().join('|')===q.choices.map(c=>c.id).sort().join('|')));return cs[0]}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}async function approach(){state='Approaching';gymAction='approach';renderGame('相談者が来ています…');await sleep(950);consult()}function consult(){state='Consulting';gymAction='talk';answerStartAt=performance.now();renderGame()}function renderTop(){topbar.classList.remove('hidden');clear(topbar);[['相談',`${idx+1} / 15`],['スコア',stats.score],['連続正解',stats.currentStreak],['正解',stats.correct],['惜しい',stats.near_miss],['不正解',stats.wrong]].forEach(([a,b])=>topbar.append(h('div','pill',`${a}: ${b}`)))}
function renderGame(waitMsg){renderTop();panel.className='panel';clear(panel);const q=deck[idx];panel.append(h('div','pill',`${q.problemType} ${PROBLEM_TYPE_LABELS[q.problemType]}`));const card=h('div','card');card.append(h('b',null,`相談者 ${String(idx+1).padStart(2,'0')}`),h('div',null,`目的: ${PROBLEM_TYPE_LABELS[q.problemType]}`),h('div',null,`状況: ${q.questionText.slice(0,24)}…`));panel.append(card,h('div','question',waitMsg||q.questionText));const grid=h('div','choice-grid');q.choices.forEach(c=>{const b=h('button','choice',c.name);b.disabled=!!waitMsg||state!=='Consulting';b.onclick=()=>answer(c);grid.append(b)});panel.append(grid)}
function answer(c){if(state!=='Consulting')return;selected=c;const ms=performance.now()-answerStartAt;stats.totalAnswerMs+=ms;const key=c.role;if(key==='correct'){stats.correct++;stats.currentStreak++;stats.maxStreak=Math.max(stats.maxStreak,stats.currentStreak);const seconds=ms/1000;const speedPoint=Math.max(0,300-Math.floor(seconds*20));const streakPoint=Math.min(stats.currentStreak-1,4)*50;stats.score+=1000+speedPoint+streakPoint;gymAction='happy'}else{stats[key]++;stats.currentStreak=0;gymAction=key==='near_miss'?'near_miss':'wrong'}stats.byType[deck[idx].problemType][key]++;state='AnswerFeedback';renderFeedback(ms)}
function makeCorrectReason(q){const item=itemById[q.correctId]||{};const vals=(NUTR[q.problemType]||[]).map(k=>item[k]?`${LABEL[k]}が${item[k]}${UNIT[k]}`:'').filter(Boolean).join('、');const rt=rules.problem_types?.[q.problemType]||{};return `この相談条件では「${rt.name||PROBLEM_TYPE_LABELS[q.problemType]}」の考え方が合いやすいです。${rt.explanation_basis||''}${vals?` 選択肢データでは、${vals}です。`:''}`}
