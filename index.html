    /* ===== UI/UX/a11y 改善 v1（既存ルールの後に置き、カスケードで上書き） ===== */

    /* 3Dキャラ: プレイ中のみ表示。空（ロード前/失敗時）は装飾を消す */

    /* モーション低減設定の尊重 */
    @media (prefers-reduced-motion:reduce){

function startGame(){loadThree();stats={score:0,correct:0,near_miss:0,wrong:0,currentStreak:0,maxStreak:0,totalAnswerMs:0,byType:Object.fromEntries(TYPE_KEYS.map(t=>[t,{correct:0,near_miss:0,wrong:0}]))};rankingSubmitStarted=false;rankingSubmitFinished=false;rankingMessage='ランキング送信待機中です。';rankingRows=[];idx=0;deck=makeDeck().map(q=>({...q,choices:shuffle(q.choices)}));renderIntro()}
function renderIntro(){state='Intro';setPlaying(false);topbar.classList.add('hidden');toTop();panel.className='panel home';clear(panel);panel.append(h('h2',null,'はじめに'));const lines=['あなたはジムの新人トレーナーです。','あなたの元に相談者がやってきます。','どうやらみなさん、筋トレ後の食事についてお悩みの様子です。','相談内容に合わせて、最適な食事を教えてあげましょう。'];const story=h('div','story');lines.forEach(t=>story.append(h('p','story-line',t)));panel.append(story);const start=h('button','primary intro-start','相談を受ける');start.onclick=()=>countdown(3);const back=h('button','secondary intro-back','名前を入れ直す');back.onclick=renderHome;panel.append(start,back);say('はじめに。あなたはジムの新人トレーナーです。相談者の悩みに合わせて、最適な食事を選びましょう。「相談を受ける」で始まります。');start.focus({preventScroll:true})}
function pickFor(t,used,usedText,correctMax=2,avoidSet=true){let cs=shuffle(byType[t]).filter(q=>!used.has(q.questionId)&&!usedText.has(q.questionText));cs=cs.filter(q=>deck.filter(d=>d.correctId===q.correctId).length<correctMax);if(avoidSet)cs=cs.filter(q=>!deck.some(d=>d.choices.map(c=>c.id).sort().join('|')===q.choices.map(c=>c.id).sort().join('|')));return cs[0]}
function makeDeck(){for(const max of [2,3])for(const avoid of [true,false]){deck=[];const used=new Set(),texts=new Set();let ok=true;for(const t of TYPE_KEYS){const q=pickFor(t,used,texts,max,avoid);if(!q){ok=false;break}deck.push(q);used.add(q.questionId);texts.add(q.questionText)}if(!ok)continue;for(const t of shuffle(TYPE_KEYS).slice(0,6)){const q=pickFor(t,used,texts,max,avoid);if(!q){ok=false;break}deck.push(q);used.add(q.questionId);texts.add(q.questionText)}if(ok&&deck.length===15)return arrange(shuffle(deck))}renderErrors([err('抽選エラー',FILES.questions,'','','条件を維持して15問を作れません')]);throw new Error('deck failed')}
function arrange(a){const remaining=[...a],out=[];while(remaining.length){let pick=remaining.findIndex(q=>q.problemType!==out.at(-1)?.problemType);if(pick<0)pick=0;out.push(remaining.splice(pick,1)[0])}for(let i=2;i<out.length;i++){if(out[i].problemType===out[i-1].problemType&&out[i].problemType===out[i-2].problemType){const j=out.findIndex((q,k)=>k>i&&q.problemType!==out[i].problemType&&q.problemType!==out[i-1].problemType);if(j>i)[out[i],out[j]]=[out[j],out[i]]}}return out}
async function countdown(n){state='Countdown';setPlaying(false);say('まもなく開始します');panel.classList.add('hidden');const cd=$('countdown');cd.classList.remove('hidden');for(let i=n;i>0;i--){cd.textContent=i;if(!prefersReducedMotion){cd.classList.remove('tick');void cd.offsetWidth;cd.classList.add('tick')}await sleep(prefersReducedMotion?250:650)}cd.classList.add('hidden');cd.classList.remove('tick');panel.classList.remove('hidden');approach()}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}async function approach(){state='Approaching';gymAction='approach';renderGame('相談者が来ています…');await sleep(950);consult()}function consult(){state='Consulting';gymAction='talk';answerStartAt=performance.now();renderGame();say('相談 '+(idx+1)+' / 15。'+((deck[idx]&&deck[idx].questionText)||''));document.dispatchEvent(new CustomEvent('toremeshi:question',{detail:{questionId:deck[idx]?.questionId??null}}))}function renderTop(){setPlaying(true);topbar.classList.remove('hidden');clear(topbar);[['相談',`${idx+1} / 15`],['スコア',stats.score],['連続正解',stats.currentStreak],['正解',stats.correct],['惜しい',stats.near_miss],['不正解',stats.wrong]].forEach(([a,b])=>topbar.append(h('div','pill',`${a}: ${b}`)));const pr=h('div','progress');const fill=h('i');fill.style.width=Math.min(100,(idx+1)/15*100)+'%';pr.append(fill);topbar.append(pr)}
function renderGame(waitMsg){toTop();renderTop();panel.className='panel';clear(panel);const q=deck[idx];const card=h('div','card');card.append(h('b',null,`相談者 ${String(idx+1).padStart(2,'0')}`),h('div',null,`相談者のタイプ: ${PROBLEM_TYPE_LABELS[q.problemType]}`));panel.append(card,h('div','question',waitMsg||q.questionText));const grid=h('div','choice-grid');q.choices.forEach(c=>{const b=h('button','choice',c.name);b.disabled=!!waitMsg||state!=='Consulting';b.onclick=()=>answer(c);grid.append(b)});panel.append(grid)}
function answer(c){if(state!=='Consulting')return;selected=c;const ms=performance.now()-answerStartAt;stats.totalAnswerMs+=ms;const key=c.role;if(key==='correct'){stats.correct++;stats.currentStreak++;stats.maxStreak=Math.max(stats.maxStreak,stats.currentStreak);const seconds=ms/1000;const speedPoint=Math.max(0,300-Math.floor(seconds*20));const streakPoint=Math.min(stats.currentStreak-1,4)*50;stats.score+=1000+speedPoint+streakPoint;gymAction='happy'}else{stats[key]++;stats.currentStreak=0;gymAction=key==='near_miss'?'near_miss':'wrong'}stats.byType[deck[idx].problemType][key]++;document.dispatchEvent(new CustomEvent('toremeshi:answer',{detail:{isCorrect:key==='correct',isClose:key==='near_miss',questionId:deck[idx]?.questionId??null}}));state='AnswerFeedback';renderFeedback(ms)}
function userReason(text){return String(text||'').replaceAll('主条件','大切な条件').replaceAll('目的','相談内容').replaceAll('問題タイプ','相談者タイプ').replaceAll('選択肢データ','この候補')}
function makeCorrectReason(q){const item=itemById[q.correctId]||{};const vals=(NUTR[q.problemType]||[]).filter(k=>k!=='allergen_tags').map(k=>item[k]?`${LABEL[k]}が${item[k]}${UNIT[k]}`:'').filter(Boolean).join('、');const rt=rules.problem_types?.[q.problemType]||{};return `この相談では「${PROBLEM_TYPE_LABELS[q.problemType]}」に合う選び方が大切です。${rt.explanation_basis||''}${vals?` この候補は、${vals}です。`:''}`}
function choiceNutrients(q,id){const item=itemById[id]||{};return (NUTR[q.problemType]||[]).filter(k=>k!=='allergen_tags').map(k=>item[k]?`${LABEL[k]}が${item[k]}${UNIT[k]}`:'').filter(Boolean).join('、')}
function explainChoice(q,c){if(c.role==='correct')return makeCorrectReason(q);const base=userReason(c.reason||'今回は相談内容と合いにくい候補です。');const n=choiceNutrients(q,c.id);return n?`${base} この候補は、${n}です。`:base}
function renderFeedback(ms){toTop();renderTop();clear(panel);const q=deck[idx], correct=q.choices.find(x=>x.role==='correct');say('結果は'+cLabel(selected.role)+'。正解は'+correct.name);panel.append(h('h2',null,`結果: ${cLabel(selected.role)}`),h('p','muted',`回答時間: ${(ms/1000).toFixed(1)}秒`),h('p',null,`あなたの回答: ${selected.name}`),h('p',null,`正解: ${correct.name}`));const fb=h('div','feedback');fb.append(h('h3',null,'ひとこと解説'),h('p',null,explainChoice(q,selected)));panel.append(fb);const next=h('button','primary next-action',idx===14?'結果を見る':'次の相談者へ');next.onclick=exitNext;panel.append(next);const details=h('details','detail-box');details.append(h('summary',null,'ほかの選択肢'));const grid=h('div','choice-grid');q.choices.forEach(c=>{const mark=c.role==='correct'?'✓ 正解':c.role==='near_miss'?'△ 惜しい':'✗ 不正解';const b=h('button','choice '+c.role,`${mark}：${c.name}${c.id===selected.id?'（あなたの回答）':''}`);b.disabled=true;grid.append(b)});const ul=h('ul','reason-list');q.choices.forEach(c=>ul.append(h('li',null,`${cLabel(c.role)}: ${c.name}${c.id===selected.id?'（あなたの回答）':''} — ${explainChoice(q,c)}`)));details.append(grid,ul);panel.append(details);next.focus({preventScroll:true})}function cLabel(r){return r==='correct'?'正解':r==='near_miss'?'惜しい':'不正解'}
async function exitNext(){state='Exiting';gymAction='exit';renderGame('相談者が退出しています…');await sleep(750);idx++; if(idx>=15)renderResult(); else approach()}
function renderResult(){state='Result';setPlaying(false);toTop();topbar.classList.add('hidden');clear(panel);const rate=Math.round(stats.correct/15*100);panel.append(h('h1',null,'結果'),h('div','big',`${stats.score} 点`),h('p','subtitle',judge(rate)));const g=h('div','result-grid');[['スコア',`${stats.score} 点`],['正解数',`${stats.correct} / 15`],['正答率',`${rate}%`],['合計回答時間',fmtMs(stats.totalAnswerMs)],['最大連続正解数',stats.maxStreak],['惜しい / 不正解',`${stats.near_miss} / ${stats.wrong}`]].forEach(([a,b])=>{const s=h('div','stat');s.append(h('b',null,a),h('div',null,b));g.append(s)});panel.append(g,h('h3',null,'相談者タイプ別'));const ul=h('ul','reason-list');TYPE_KEYS.forEach(t=>{const r=stats.byType[t];ul.append(h('li',null,`${PROBLEM_TYPE_LABELS[t]}: 正解${r.correct} / 惜しい${r.near_miss} / 不正解${r.wrong}`))});panel.append(ul);const share=h('button','secondary','結果をシェア');share.onclick=shareResult;const other=h('a','secondary','他のゲームで遊ぶ');other.href=LAB_URL;other.rel='noopener';other.setAttribute('aria-label','他のゲームで遊ぶ（外部サイト）');const finish=h('button','secondary','ゲーム終了');finish.onclick=renderHome;const again=h('button','primary','もう一度プレイ');again.onclick=renderHome;const row=h('div','result-actions');row.append(again,share,other,finish);const toast=h('p','toast');toast.id='shareToast';panel.append(row,toast,rankingBox());submitRankingOnce()}function judge(rate){if(rate>=90)return '完璧に近いトレメシ名人！';if(rate>=70)return 'かなり頼れる栄養トレーナー！';if(rate>=50)return '惜しい判断も多い成長中トレーナー！';return '解説を読んで次は正解を狙おう！'}function shareResult(){const text=`トレメシで${stats.score}点、正解${stats.correct}/15でした！ ${GAME_URL}`;const t=$('shareToast');const set=m=>{if(t)t.textContent=m};if(navigator.share){navigator.share({text,url:GAME_URL}).then(()=>set('共有しました')).catch(()=>{})}else if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(()=>set('結果をコピーしました')).catch(()=>set('コピーできませんでした'))}else{set('お使いの環境では共有できません')}}function rankingBox(){const box=h('div','card');box.id='rankingBox';box.append(h('h3',null,'ランキング'),h('p','muted',rankingMessage));const ol=h('ol','reason-list');rankingRows.slice(0,10).forEach(r=>{const rank=r.rank_no==null||r.rank_no===''?'':`${r.rank_no}位 `;ol.append(h('li',null,`${rank}${r.display_name||r.player_name||r.player||'名無し'}: ${r.score} 点`))});box.append(ol);if(!rankingSubmitStarted&&!rankingSubmitFinished&&idx>=15&&player){const retry=h('button','secondary','ランキングを再送信');retry.onclick=submitRankingOnce;box.append(retry)}if(rankingSubmitFinished&&(!rankingRows||rankingRows.length===0)){const re=h('button','secondary','ランキングを再取得');re.onclick=()=>{loadRanking().then(refreshRankingBox).catch(()=>{rankingMessage='ランキングを取得できませんでした。';refreshRankingBox()})};box.append(re)}return box}function refreshRankingBox(){const old=$('rankingBox');if(old)old.replaceWith(rankingBox())}
function fmtMs(ms){return `${(ms/1000).toFixed(1)}秒`}
async function submitRankingOnce(){if(rankingSubmitStarted||rankingSubmitFinished||idx<15||!player)return;rankingSubmitStarted=true;rankingMessage='ランキング送信中...';refreshRankingBox();try{const client=await getSupabaseClient();if(!client)throw new Error('Supabaseライブラリを読み込めませんでした');const {error}=await client.rpc('submit_score',{p_display_name:normalizeDisplayName(player),p_game_slug:GAME_SLUG,p_score:Math.trunc(stats.score),p_client_version:CLIENT_VERSION});if(error)throw error;rankingSubmitFinished=true;rankingMessage='ランキングへ送信しました。';refreshRankingBox();try{await loadRanking(client)}catch(e){rankingMessage='送信は成功しましたが、ランキング取得に失敗しました。';console.warn(e)}}catch(e){rankingSubmitStarted=false;rankingMessage='ランキング送信に失敗しました。ゲーム結果は表示されています。';console.warn(e)}finally{refreshRankingBox()}}async function loadRanking(client){const c=client||await getSupabaseClient();if(!c)throw new Error('Supabaseライブラリを読み込めませんでした');const {data,error}=await c.rpc('get_best_score_ranking',{p_game_slug:GAME_SLUG,p_limit:10});if(error)throw error;rankingRows=Array.isArray(data)?data:[]}async function getSupabaseClient(){if(supabaseClient)return supabaseClient;try{const mod=await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');supabaseClient=mod.createClient(SUPABASE_URL,SUPABASE_PUBLISHABLE_KEY,{auth:{persistSession:false,autoRefreshToken:false}});return supabaseClient}catch(e){console.warn(e);return null}}
let gymAction='idle';
loadData();
</script>
